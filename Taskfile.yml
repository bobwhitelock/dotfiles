# https://taskfile.dev

version: '3'

# Prefix output with the name of the task that is running - most useful when
# tasks have `deps`, as these run in parallel and so their output can get
# interleaved. For interactive tasks make sure to add `interactive: true` so
# their output does not get messed up by this.
output: prefixed

tasks:
  default:
    desc: "List available tasks (tasks without description are internal and not shown)"
    # Strictly speaking this isn't really interactive, but this makes the output nicer.
    interactive: true
    cmd: task --list

  push-obsidian:
    desc: "Push obsidian configs from dotfiles to the notes vault (set NOTES to override destination)"
    cmd: |
      if [ -z "${NOTES:-}" ]; then
        echo "Error: NOTES env var is not set" >&2
        exit 1
      fi
      mkdir -p "$NOTES/notes/.obsidian"
      rsync -av --delete --exclude=graph.json --exclude=workspace.json obsidian/ "$NOTES/notes/.obsidian/"
      rsync -av obsidian.vimrc "$NOTES/notes/.obsidian.vimrc"

  pull-obsidian:
    desc: "Pull obsidian configs from the notes vault back into dotfiles (set NOTES to override source)"
    cmd: |
      if [ -z "${NOTES:-}" ]; then
        echo "Error: NOTES env var is not set" >&2
        exit 1
      fi
      rsync -av --delete --exclude=graph.json --exclude=workspace.json "$NOTES/notes/.obsidian/" obsidian/
      rsync -av "$NOTES/notes/.obsidian.vimrc" obsidian.vimrc

  test:
    desc: "Run tests"
    cmd: pytest tests/ -v
